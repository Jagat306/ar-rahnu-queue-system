<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ar Rahnu Queue</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #fff9eb;
      color: #2f2615;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(100%, 430px);
      background: #ffffff;
      border: 1px solid #f1dca3;
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(109, 82, 21, 0.12);
      padding: 26px;
    }

    .brand {
      text-align: center;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #9b7115;
    }

    p {
      margin: 0;
      color: #6e6145;
      line-height: 1.45;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: 700;
      font-size: 14px;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid #e5cf92;
      border-radius: 6px;
      padding: 0 14px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #b98b22;
      box-shadow: 0 0 0 3px rgba(185, 139, 34, 0.15);
    }

    .buttons {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      min-height: 58px;
      border: 0;
      border-radius: 6px;
      background: #b98b22;
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #a27618;
    }

    .ticket {
      display: none;
      margin-top: 22px;
      padding: 20px;
      background: #fff4d2;
      border: 1px solid #edce72;
      border-radius: 8px;
      text-align: center;
    }

    .ticket strong {
      display: block;
      font-size: 32px;
      color: #8a6313;
      margin: 8px 0;
    }

    .status {
      font-weight: 700;
      color: #5d4b24;
    }

    .reminder {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
      color: #8a6313;
    }
  </style>
</head>
<body>
  <main>
    <section class="brand">
      <h1>Ar Rahnu</h1>
      <p>Pilih urusan untuk mendapatkan nombor giliran.</p>
    </section>

    <label for="phone">No. telefon WhatsApp (optional)</label>
    <input id="phone" type="tel" placeholder="Contoh: 60123456789" />

    <section class="buttons">
      <button data-service="gadai">Gadai</button>
      <button data-service="tebus">Tebus</button>
      <button data-service="overlap">Overlap</button>
      <button data-service="upah">Bayaran Upah</button>
      <button data-service="koperasi">Koperasi</button>
    </section>

    <section id="ticket" class="ticket">
      <p>Nombor anda:</p>
      <strong id="number">-</strong>
      <p class="status">Status: <span id="status">Menunggu</span></p>
      <p class="reminder">Sila screenshot nombor giliran anda</p>
    </section>
  </main>

  <script>
    const buttons = document.querySelectorAll("button[data-service]");
    const phone = document.getElementById("phone");
    const ticket = document.getElementById("ticket");
    const number = document.getElementById("number");
    const statusText = document.getElementById("status");

    buttons.forEach((button) => {
      button.addEventListener("click", async () => {
        button.disabled = true;

        try {
          const response = await fetch("/api/queue", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              service: button.dataset.service,
              phone: phone.value.trim(),
            }),
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Server error");

          number.textContent = data.number;
          statusText.textContent = data.status;
          ticket.style.display = "block";
        } catch (error) {
          alert(error.message);
        } finally {
          button.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
