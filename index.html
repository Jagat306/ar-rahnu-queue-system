<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ar Rahnu Queue</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #fff9eb;
      color: #2f2615;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    main {
      width: min(100%, 440px);
      background: #ffffff;
      border: 1px solid #f1dca3;
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(109, 82, 21, 0.12);
      padding: 24px;
    }

    .brand {
      text-align: center;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #9b7115;
    }

    p {
      margin: 0;
      color: #6e6145;
      line-height: 1.45;
    }

    .buttons {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      min-height: 58px;
      border: 0;
      border-radius: 6px;
      background: #b98b22;
      color: #ffffff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: #a27618;
    }

    .ticket {
      display: none;
      margin-top: 22px;
      padding: 22px;
      background: #fff4d2;
      border: 1px solid #edce72;
      border-radius: 8px;
      text-align: center;
    }

    .ticket strong {
      display: block;
      font-size: 48px;
      color: #8a6313;
      margin: 8px 0;
      line-height: 1;
    }

    .service {
      font-size: 18px;
      font-weight: 800;
      color: #3b2d10;
    }

    .status-badge {
      display: inline-block;
      margin-top: 14px;
      padding: 9px 14px;
      border-radius: 999px;
      background: #6e6145;
      color: #ffffff;
      font-weight: 800;
    }

    .status-badge.called {
      background: #1f8f4d;
      animation: pulse 1s infinite;
    }

    .reminder {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
      color: #8a6313;
    }

    .popup {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(47, 38, 21, 0.86);
    }

    .popup.show {
      display: grid;
    }

    .popup-card {
      width: min(100%, 460px);
      min-height: 72vh;
      background: #ffffff;
      border: 4px solid #edce72;
      border-radius: 8px;
      padding: 28px;
      text-align: center;
      display: grid;
      align-content: center;
      animation: popIn 0.35s ease-out;
    }

    .popup-card h2 {
      margin: 0 0 12px;
      font-size: 26px;
      color: #9b7115;
    }

    .popup-number {
      display: block;
      font-size: 68px;
      line-height: 1;
      font-weight: 900;
      color: #1f8f4d;
      margin: 12px 0;
    }

    .popup-counter {
      font-size: 28px;
      font-weight: 900;
      color: #2f2615;
      margin-bottom: 20px;
    }

    .popup button {
      background: #1f8f4d;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.04);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="brand">
      <h1>Ar Rahnu</h1>
      <p>Pilih urusan untuk mendapatkan nombor giliran.</p>
    </section>

    <section class="buttons">
      <button data-service="gadai">Gadai</button>
      <button data-service="tebus">Tebus</button>
      <button data-service="overlap">Overlap</button>
      <button data-service="upah">Bayaran Upah</button>
      <button data-service="koperasi">Koperasi</button>
    </section>

    <section id="ticket" class="ticket">
      <p>Nombor anda:</p>
      <strong id="number">-</strong>
      <p id="service" class="service">-</p>
      <span id="status" class="status-badge">Waiting</span>
      <p class="reminder">Sila screenshot nombor giliran anda</p>
    </section>
  </main>

  <div id="popup" class="popup">
    <section class="popup-card">
      <h2>Giliran Anda</h2>
      <span id="popupNumber" class="popup-number">-</span>
      <p id="popupText" class="popup-counter">Sila ke kaunter sekarang</p>
      <button id="closePopup">Saya Faham</button>
    </section>
  </div>

  <script>
    const ticketKey = "arRahnuTicket";
    const buttons = document.querySelectorAll("button[data-service]");
    const ticket = document.getElementById("ticket");
    const number = document.getElementById("number");
    const serviceText = document.getElementById("service");
    const statusText = document.getElementById("status");
    const popup = document.getElementById("popup");
    const popupNumber = document.getElementById("popupNumber");
    const popupText = document.getElementById("popupText");
    const closePopup = document.getElementById("closePopup");

    let savedTicket = loadSavedTicket();
    let popupShown = localStorage.getItem("arRahnuPopupShown") === "true";

    function loadSavedTicket() {
      try {
        return JSON.parse(localStorage.getItem(ticketKey));
      } catch (error) {
        return null;
      }
    }

    function saveTicket(queue) {
      savedTicket = {
        id: queue.id,
        number: queue.number,
        service: queue.service,
        status: queue.status,
        counter: queue.counter,
      };
      localStorage.setItem(ticketKey, JSON.stringify(savedTicket));
    }

    function statusLabel(status) {
      if (status === "serving" || status === "Serving") return "Dipanggil";
      if (status === "done" || status === "Selesai") return "Selesai";
      return "Waiting";
    }

    function renderTicket(queue) {
      if (!queue) return;

      number.textContent = queue.number;
      serviceText.textContent = queue.service;
      statusText.textContent = statusLabel(queue.status);
      statusText.classList.toggle("called", queue.status === "serving" || queue.status === "Serving");
      ticket.style.display = "block";
    }

    function playAlertSound() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const context = new AudioContext();
        const oscillator = context.createOscillator();
        const gain = context.createGain();

        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.frequency.value = 880;
        gain.gain.value = 0.18;
        oscillator.start();
        oscillator.stop(context.currentTime + 0.55);
      } catch (error) {
        // Some browsers block sound until the user interacts; the popup still appears.
      }
    }

    function showCalledPopup(queue) {
      if (popupShown) return;

      popupShown = true;
      localStorage.setItem("arRahnuPopupShown", "true");
      popupNumber.textContent = queue.number;
      popupText.textContent = `Sila ke Kaunter ${queue.counter}`;
      popup.classList.add("show");
      playAlertSound();
    }

    async function monitorTicket() {
      if (!savedTicket) return;

      try {
        const response = await fetch("/api/queue");
        const queues = await response.json();
        const latest = queues.find((item) => item.id === savedTicket.id || item.number === savedTicket.number);

        if (!latest) return;

        saveTicket(latest);
        renderTicket(latest);

        if ((latest.status === "serving" || latest.status === "Serving") && latest.counter) {
          showCalledPopup(latest);
        }
      } catch (error) {
        console.error(error);
      }
    }

    buttons.forEach((button) => {
      button.addEventListener("click", async () => {
        button.disabled = true;

        try {
          const response = await fetch("/api/queue", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ service: button.dataset.service }),
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Server error");

          popupShown = false;
          localStorage.setItem("arRahnuPopupShown", "false");
          saveTicket(data);
          renderTicket(data);
        } catch (error) {
          alert(error.message);
        } finally {
          button.disabled = false;
        }
      });
    });

    closePopup.addEventListener("click", () => {
      popup.classList.remove("show");
    });

    if (savedTicket) {
      renderTicket(savedTicket);
      monitorTicket();
    }

    setInterval(monitorTicket, 2000);
  </script>
</body>
</html>
