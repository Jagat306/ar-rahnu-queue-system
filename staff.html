<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Queue System - Sahabat Ar Rahnu Kuantan</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #fff8e8;
      color: #2f2615;
      padding: 22px;
    }

    .wrap {
      width: min(100%, 1060px);
      margin: 0 auto;
    }

    .brand {
      text-align: center;
      margin-bottom: 18px;
      padding: 18px;
      border-radius: 10px;
      background: #ffffff;
      border: 1px solid #f1dca3;
      box-shadow: 0 14px 35px rgba(109, 82, 21, 0.1);
    }

    .brand h1,
    .brand h2 {
      margin: 0;
      color: #9b7115;
      font-weight: 900;
      line-height: 1.12;
    }

    .brand h1 {
      font-size: 30px;
    }

    .brand h2 {
      margin-top: 6px;
      font-size: 20px;
      color: #2f2615;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: stretch;
      margin-bottom: 16px;
    }

    h3 {
      margin: 0;
      color: #9b7115;
      font-size: 20px;
    }

    p {
      margin: 6px 0 0;
      color: #6e6145;
      line-height: 1.45;
    }

    .counter-badge {
      min-width: 210px;
      padding: 20px 24px;
      border-radius: 10px;
      background: #b98b22;
      color: #ffffff;
      text-align: center;
      font-size: 32px;
      font-weight: 900;
      display: grid;
      place-items: center;
      box-shadow: 0 14px 26px rgba(185, 139, 34, 0.22);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #f1dca3;
      border-radius: 10px;
      padding: 18px;
      box-shadow: 0 14px 35px rgba(109, 82, 21, 0.1);
    }

    .current {
      margin-top: 14px;
      min-height: 190px;
      padding: 24px;
      border-radius: 10px;
      background: #fff4d2;
      border: 1px solid #edce72;
      display: grid;
      align-content: center;
      text-align: center;
    }

    .current .number {
      display: block;
      font-size: 64px;
      font-weight: 900;
      color: #8a6313;
      line-height: 1;
      margin-bottom: 10px;
    }

    .current .service {
      font-size: 22px;
      font-weight: 900;
      color: #3b2d10;
    }

    .status {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #1f8f4d;
      color: #ffffff;
      font-size: 14px;
      font-weight: 900;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      min-height: 50px;
      border: 0;
      border-radius: 8px;
      background: #b98b22;
      color: #ffffff;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: grid;
      place-items: center;
      padding: 0 14px;
      text-align: center;
      box-shadow: 0 8px 16px rgba(185, 139, 34, 0.16);
    }

    button:hover {
      background: #a27618;
    }

    button.secondary {
      background: #ffffff;
      color: #8a6313;
      border: 1px solid #d8b85a;
    }

    button.danger {
      background: #9d2f2f;
    }

    button.danger:hover {
      background: #812323;
    }

    .queue-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .queue-item {
      width: 100%;
      min-height: 66px;
      background: #ffffff;
      color: #2f2615;
      border: 1px solid #ead49b;
      border-left: 8px solid #b98b22;
      justify-content: start;
      text-align: left;
      padding: 12px 14px;
      box-shadow: none;
    }

    .queue-item:hover {
      background: #fff4d2;
    }

    .queue-item strong {
      display: block;
      font-size: 24px;
      color: #8a6313;
      margin-bottom: 2px;
    }

    .service-gadai { border-left-color: #b98b22; }
    .service-tebus { border-left-color: #1f8f4d; }
    .service-overlap { border-left-color: #4564b8; }
    .service-upah { border-left-color: #9d5ab8; }
    .service-upah_lanjutan { border-left-color: #7d4ab8; }
    .service-koperasi { border-left-color: #c2682b; }
    .service-lain { border-left-color: #6e6145; }

    .empty {
      margin-top: 14px;
      padding: 18px;
      border-radius: 8px;
      background: #fff9eb;
      border: 1px dashed #d8b85a;
      color: #6e6145;
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid #f4e6bd;
      text-align: left;
      font-size: 14px;
    }

    th {
      color: #7c5b13;
    }

    tr.active-row {
      background: #fff4d2;
      font-weight: 900;
    }

    .service-pill {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      background: #fff4d2;
      color: #5f4203;
      font-weight: 800;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .summary-card {
      min-height: 88px;
      padding: 14px;
      border-radius: 10px;
      background: #fff9eb;
      border: 1px solid #f1dca3;
      border-left: 8px solid #b98b22;
    }

    .summary-card span {
      display: block;
      color: #6e6145;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .summary-card strong {
      display: block;
      color: #2f2615;
      font-size: 30px;
      line-height: 1;
      font-weight: 900;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      header,
      .grid,
      .actions,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .counter-badge {
        width: 100%;
      }

      .brand h1 {
        font-size: 24px;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="brand">
      <h1>SAHABAT AR RAHNU KUANTAN</h1>
      <h2>PANEL QUEUE SYSTEM</h2>
    </section>

    <header>
      <section class="panel">
        <h3>Operasi Kaunter</h3>
        <p>Pilih queue secara manual atau panggil pelanggan paling awal.</p>
      </section>
      <div id="counterBadge" class="counter-badge">KAUNTER -</div>
    </header>

    <main class="grid">
      <section class="panel">
        <h3>Sedang Dipanggil</h3>
        <div class="current">
          <span id="currentNumber" class="number">-</span>
          <span id="currentService" class="service">Belum ada panggilan</span>
          <span id="currentStatus" class="status">Menunggu</span>
        </div>
        <div class="actions">
          <button id="callNext">CALL NEXT</button>
          <button id="changeCounter" class="secondary">Tukar Kaunter</button>
        </div>
      </section>

      <section class="panel">
        <h3>Queue Menunggu</h3>
        <div id="waitingList" class="queue-list"></div>
      </section>
    </main>

    <section class="panel" style="margin-top: 16px;">
      <h3>TRANSAKSI HARI INI</h3>
      <div id="summaryGrid" class="summary-grid"></div>
    </section>

    <section class="panel" style="margin-top: 16px;">
      <div class="actions">
        <h3>Semua Queue</h3>
        <button id="resetQueue" class="danger">RESET</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>No.</th>
            <th>Service</th>
            <th>Status</th>
            <th>Counter</th>
          </tr>
        </thead>
        <tbody id="queueBody"></tbody>
      </table>
    </section>
  </div>

  <script>
    const counterBadge = document.getElementById("counterBadge");
    const currentNumber = document.getElementById("currentNumber");
    const currentService = document.getElementById("currentService");
    const currentStatus = document.getElementById("currentStatus");
    const waitingList = document.getElementById("waitingList");
    const queueBody = document.getElementById("queueBody");
    const summaryGrid = document.getElementById("summaryGrid");
    const callNextButton = document.getElementById("callNext");
    const changeCounterButton = document.getElementById("changeCounter");
    const resetButton = document.getElementById("resetQueue");

    let selectedCounter = localStorage.getItem("selectedCounter");
    let activeQueueId = null;
    const services = [
      { key: "gadai", label: "Gadai" },
      { key: "tebus", label: "Tebus" },
      { key: "overlap", label: "Overlap" },
      { key: "upah", label: "Bayaran Upah 6 Bulan Pertama" },
      { key: "upah_lanjutan", label: "Bayaran Upah 6 Bulan Lanjutan" },
      { key: "koperasi", label: "Koperasi" },
      { key: "lain", label: "Lain-Lain" },
    ];

    function askCounter() {
      let value = "";

      while (!["1", "2", "3"].includes(value)) {
        value = prompt("Pilih kaunter anda (1, 2, atau 3)", selectedCounter || "1");
        if (value === null && selectedCounter) break;
      }

      if (["1", "2", "3"].includes(value)) {
        selectedCounter = value;
        localStorage.setItem("selectedCounter", selectedCounter);
      }

      counterBadge.textContent = `KAUNTER ${selectedCounter || "-"}`;
    }

    function isWaiting(status) {
      return status === "waiting" || status === "Menunggu" || status === "Waiting";
    }

    function statusLabel(status) {
      if (status === "serving" || status === "Serving") return "Dipanggil";
      if (status === "done" || status === "selesai" || status === "Selesai") return "Selesai";
      return "Menunggu";
    }

    function serviceClass(serviceKey) {
      return `service-${serviceKey || "lain"}`;
    }

    function logStaffSyncWarning(message, details = {}) {
      console.warn("[staff-sync]", message, details);
    }

    function setCurrent(queue) {
      activeQueueId = queue.id;
      currentNumber.textContent = queue.number;
      currentService.textContent = `${queue.service} - Kaunter ${queue.counter}`;
      currentStatus.textContent = "Dipanggil";
    }

    function isToday(dateText) {
      const date = new Date(dateText);
      const now = new Date();
      return date.getFullYear() === now.getFullYear()
        && date.getMonth() === now.getMonth()
        && date.getDate() === now.getDate();
    }

    function renderSummary(rows) {
      const todaysRows = rows.filter((item) => isToday(item.createdAt));
      const counts = Object.fromEntries(services.map((service) => [service.key, 0]));

      todaysRows.forEach((item) => {
        if (counts[item.serviceKey] !== undefined) {
          counts[item.serviceKey] += 1;
        }
      });

      const total = todaysRows.length;
      summaryGrid.innerHTML = [
        ...services.map((service) => `
          <div class="summary-card ${serviceClass(service.key)}">
            <span>${service.label}</span>
            <strong>${counts[service.key]}</strong>
          </div>
        `),
        `
          <div class="summary-card">
            <span>Jumlah</span>
            <strong>${total}</strong>
          </div>
        `,
      ].join("");
    }

    async function loadQueue() {
      let rows = [];

      try {
        const response = await fetch("/api/queue", { cache: "no-store" });
        if (!response.ok) throw new Error(`Queue API failed: ${response.status}`);
        rows = await response.json();
      } catch (error) {
        logStaffSyncWarning("failed to load queue list", { error: error.message });
        return;
      }

      if (!Array.isArray(rows)) {
        logStaffSyncWarning("queue API did not return an array", { rows });
        return;
      }

      rows.forEach((item) => {
        const isKnownService = services.some((service) => service.key === item.serviceKey);
        const isKnownStatus = ["waiting", "serving", "done", "Menunggu", "Waiting", "Serving", "Selesai", "selesai"].includes(item.status);

        if (!isKnownService || !isKnownStatus || !item.number) {
          logStaffSyncWarning("queue record may be hidden or invalid", {
            id: item.id,
            number: item.number,
            serviceKey: item.serviceKey,
            status: item.status,
          });
        }
      });

      const waiting = rows.filter((item) => isWaiting(item.status));
      renderSummary(rows);

      waitingList.innerHTML = waiting.length
        ? waiting.map((item) => `
          <button class="queue-item ${serviceClass(item.serviceKey)}" data-id="${item.id}">
            <strong>${item.number}</strong>
            <span>${item.service}</span>
          </button>
        `).join("")
        : '<div class="empty">Tiada queue menunggu</div>';

      queueBody.innerHTML = rows
        .slice()
        .reverse()
        .map((item) => `
          <tr class="${item.id === activeQueueId ? "active-row" : ""}">
            <td>${item.number}</td>
            <td><span class="service-pill">${item.service}</span></td>
            <td>${statusLabel(item.status)}</td>
            <td>${item.counter ? "Kaunter " + item.counter : "-"}</td>
          </tr>
        `)
        .join("");

      document.querySelectorAll(".queue-item").forEach((button) => {
        button.addEventListener("click", () => callQueue(button.dataset.id));
      });
    }

    async function postJson(url, body = {}) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await response.json();

      if (!response.ok) throw new Error(data.error || "Server error");
      return data;
    }

    async function callQueue(id) {
      if (!selectedCounter) askCounter();
      if (!selectedCounter) return;

      try {
        const data = await postJson(`/api/call/${id}`, { counter: selectedCounter });
        setCurrent(data.queue);
        await loadQueue();
      } catch (error) {
        alert(error.message);
      }
    }

    callNextButton.addEventListener("click", async () => {
      callNextButton.disabled = true;

      try {
        if (!selectedCounter) askCounter();
        if (!selectedCounter) return;

        const data = await postJson("/api/next", { counter: selectedCounter });
        setCurrent(data.queue);
        await loadQueue();
      } catch (error) {
        alert(error.message);
      } finally {
        callNextButton.disabled = false;
      }
    });

    changeCounterButton.addEventListener("click", askCounter);

    resetButton.addEventListener("click", async () => {
      if (!confirm("Reset semua queue dan mula semula dari G001, T001, O001, U001, UI001, K001, L001?")) return;

      try {
        await postJson("/api/reset");
        activeQueueId = null;
        currentNumber.textContent = "-";
        currentService.textContent = "Belum ada panggilan";
        currentStatus.textContent = "Menunggu";
        await loadQueue();
      } catch (error) {
        alert(error.message);
      }
    });

    askCounter();
    loadQueue();
    setInterval(loadQueue, 2000);
  </script>
</body>
</html>
